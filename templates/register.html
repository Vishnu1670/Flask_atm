<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
</head>
<body>

<center>
    <h1>Account Registration</h1>

    <form method="POST" action="/home/register">
        
        <label>Account Number</label><br>
        <input type="text" name="acc_no" required><br><br>

        <label>Name</label><br>
        <input type="text" name="name" required><br><br>

        <label>Phone</label><br>
        <input type="text" name="phone" required><br><br>

        <label>Email</label><br>
        <input type="email" name="email" required><br><br>

        <label>CC Email (optional)</label><br>
        <input type="email" name="cc_email"><br><br>

        <label>PIN</label><br>
        <input type="password" name="pin" required><br><br>

        <label>Initial Deposit</label><br>
        <input type="number" name="balance" step="0.01" required><br><br>

        <button type="submit">Register</button>
    </form>
</center>

</body>
</html>

<script src="{{ url_for('static', filename='js/register.js') }}"></script>
